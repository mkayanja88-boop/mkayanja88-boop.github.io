<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KanTerSiP | Визитка</title>
    <!-- Подключаем иконки Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* Обнуляем отступы */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #000;
        }

        /* Настройки фонового видео */
        .video-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* Темная вуаль поверх видео для читаемости текста */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.55);
            z-index: 0;
        }

        /* Центральная карточка */
        .card {
            position: relative;
            z-index: 1;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px); /* Эффект матового стекла */
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 40px 30px;
            border-radius: 24px;
            text-align: center;
            color: #fff;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.4);
        }

        .profile-img {
            width: 110px;
            height: 110px;
            border-radius: 50%;
            border: 3px solid rgba(255, 255, 255, 0.6);
            margin-bottom: 20px;
            object-fit: cover;
        }

        h1 {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        p {
            font-size: 14px;
            color: #b3b3b3;
            margin-bottom: 30px;
        }

        /* Контейнер для круглых значков соцсетей */
        .links {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
        }

        /* Стиль круглых кнопок с иконками */
        .btn-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 54px;
            height: 54px;
            color: #fff;
            text-decoration: none;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            font-size: 22px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Эффект при наведении на иконку */
        .btn-icon:hover {
            background: #fff;
            color: #000;
            transform: translateY(-4px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.2);
        }

        /* Кнопка музыки */
        .music-ctrl {
            margin-top: 35px;
            font-size: 13px;
            cursor: pointer;
            opacity: 0.6;
            transition: opacity 0.3s;
            user-select: none;
        }
        .music-ctrl:hover {
            opacity: 1;
        }
    </style>
</head>
<body>

    <!-- Фоновое видео (положите video.mp4 в папку с сайтом) -->
    <video class="video-bg" autoplay loop muted playsinline>
        <source src="video.mp4" type="video/mp4">
    </video>

    <!-- Фоновая музыка (положите skryptonite.mp3 в папку с сайтом) -->
    <audio id="bg-audio" loop>
        <source src="skryptonite.mp3" type="audio/mpeg">
    </audio>

    <div class="overlay"></div>

    <!-- Центральный блок -->
    <div class="card" onclick="startMusic()">
        <!-- Ваша аватарка (avatar.jpg в папке с сайтом). Если не нужна, удалите строку ниже -->
        <img class="profile-img" src="avatar.jpg" alt="KanTerSiP">
        
        <h1>KanTerSiP</h1>
        <p>Добро пожаловать на мою страницу</p>

        <!-- Ссылки со значками -->
        <div class="links" onclick="event.stopPropagation();">
            <!-- Telegram -->
            <a href="https://t.me/KanTerSiP" target="_blank" class="btn-icon" title="Telegram">
                <i class="fa-brands fa-telegram"></i>
            </a>
            <!-- Twitch -->
            <a href="https://www.twitch.tv/kantersip" target="_blank" class="btn-icon" title="Twitch">
                <i class="fa-brands fa-twitch"></i>
            </a>
            <!-- Steam -->
            <a href="https://steamcommunity.com/id/KanTerSiP/" target="_blank" class="btn-icon" title="Steam">
                <i class="fa-brands fa-steam"></i>
            </a>
            <!-- Faceit (Используется иконка геймпада, так как логотипа Faceit нет в стандартном шрифте) -->
            <a href="https://www.faceit.com/ru/players/KanTerSiP" target="_blank" class="btn-icon" title="Faceit">
                <i class="fa-solid fa-gamepad"></i>
            </a>
            <!-- VK -->
            <a href="https://vk.com/kantersip" target="_blank" class="btn-icon" title="ВКонтакте">
                <i class="fa-brands fa-vk"></i>
            </a>
        </div>

        <div class="music-ctrl" id="music-status">🎵 Скриптонит — Не надо меня узнавать (Кликни для трека)</div>
    </div>

    <script>
        const audio = document.getElementById('bg-audio');
        const statusText = document.getElementById('music-status');
        let isPlaying = false;

        function startMusic() {
            if (!isPlaying) {
                audio.play().then(() => {
                    isPlaying = true;
                    statusText.innerText = "🔊 Скриптонит — Не надо меня узнавать (Пауза)";
                }).catch(error => {
                    console.log("Автовоспроизведение заблокировано браузером. Нужен клик.");
                });
            } else {
                audio.pause();
                isPlaying = false;
                statusText.innerText = "<h3>🔇 Музыка на паузе (Кликни, чтобы включить)</h3>";
                statusText.innerText = "释放 Музыка на паузе (Кликни, чтобы включить)"; // Фикс для корректного отображения смайла
                statusText.innerText = "🔇 Музыка на паузе (Кликни, чтобы включить)";
            }
